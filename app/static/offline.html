<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne — Portail Socrate</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "DM Sans", sans-serif;
      background: linear-gradient(135deg, #1a5252 0%, #2c7a7b 100%);
      color: #fff; padding: 2rem; text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem; max-width: 420px; width: 100%;
    }
    img { width: 64px; height: 64px; margin-bottom: 1rem; border-radius: 50%; background: #fff; padding: 4px; }
    h1 { margin: 0 0 0.5rem; font-size: 1.4rem; font-weight: 700; }
    p { margin: 0.5rem 0; opacity: 0.85; font-size: 0.95rem; line-height: 1.5; }
    button {
      margin-top: 1.5rem; padding: 0.75rem 1.5rem;
      background: #fff; color: #1a5252; border: none; border-radius: 0.75rem;
      font-weight: 600; font-size: 0.95rem; cursor: pointer;
      transition: transform 120ms;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/static/img/icon-192.png" alt="Socrate">
    <h1>Hors-ligne</h1>
    <p>Vous semblez ne pas avoir de connexion Internet.</p>
    <p>Vérifiez votre réseau, puis réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
