{# Champs partagés du formulaire de tâche (création) #}
<div>
  <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Titre *</label>
  <input type="text" name="title" required
         class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-loge-500">
</div>
<div>
  <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Description</label>
  <textarea name="description" rows="3"
            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"></textarea>
</div>
<div class="grid grid-cols-2 gap-3">
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Statut</label>
    <select name="status" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
      <option value="TODO" selected>À faire</option>
      <option value="IN_PROGRESS">En cours</option>
      <option value="DONE">Terminé</option>
      <option value="CANCELLED">Annulé</option>
    </select>
  </div>
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Priorité</label>
    <select name="priority" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
      <option value="LOW">Basse</option>
      <option value="MEDIUM" selected>Moyenne</option>
      <option value="HIGH">Haute</option>
    </select>
  </div>
</div>
<div>
  <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Assigné à</label>
  <select name="assignee" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
    <option value="none" selected>— Non assigné —</option>
    <optgroup label="Membres">
      {% for m in all_active %}
      <option value="m:{{ m.id }}">{{ m.first_name }} {{ m.last_name }}</option>
      {% endfor %}
    </optgroup>
    <optgroup label="Groupes">
      {% for g in all_groups %}
      <option value="g:{{ g.id }}">{{ g.name }}</option>
      {% endfor %}
    </optgroup>
  </select>
</div>
<div class="grid grid-cols-2 gap-3">
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Début</label>
    <input type="date" name="start_date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
  </div>
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Échéance</label>
    <input type="date" name="due_date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
  </div>
</div>
<div>
  <label class="inline-flex items-center gap-2 text-sm text-gray-700">
    <input type="checkbox" name="is_milestone" value="1" class="rounded border-gray-300 text-loge-700">
    <i class="ti ti-flag text-amber-500"></i> Marquer comme jalon
  </label>
</div>
