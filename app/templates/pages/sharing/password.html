<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès protégé — Document partagé</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            loge: {
              50:  '#e6f4f1',
              100: '#d0ede9',
              300: '#8eccc6',
              500: '#4a9d8f',
              600: '#3d8a7c',
              700: '#2c7a7b',
              800: '#1a5f60',
              900: '#0f4445',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-gray-50 font-sans flex flex-col items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Icône cadenas -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-loge-50 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-loge-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm px-6 py-7 space-y-5">
      <div class="text-center">
        <h1 class="text-lg font-bold text-gray-900">Accès protégé</h1>
        <p class="text-sm text-gray-500 mt-1">Ce lien est protégé par un mot de passe.</p>
      </div>

      {% if error %}
      <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="get" action="/share/{{ token }}" class="space-y-4">
        <div>
          <label for="pwd" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input id="pwd" name="pwd" type="password" required autofocus
                 placeholder="Entrez le mot de passe"
                 class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-loge-500 focus:border-transparent outline-none transition">
        </div>
        <button type="submit"
                class="w-full bg-loge-700 hover:bg-loge-800 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors shadow-sm">
          Accéder au document
        </button>
      </form>
    </div>

    <p class="text-xs text-center text-gray-400 mt-4">Partagé via le portail interne de la loge</p>
  </div>

</body>
</html>
