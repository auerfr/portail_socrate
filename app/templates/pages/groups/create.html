{% extends "base.html" %}
{% block title %}Nouveau groupe — Portail Socrate{% endblock %}

{% block content %}
<div class="p-4 lg:p-8 max-w-xl mx-auto">

  <nav class="text-sm text-gray-500 mb-4">
    <a href="/groups/" class="hover:text-loge-700">Groupes</a>
    <span class="mx-2">›</span>
    <span class="text-gray-800">Nouveau groupe</span>
  </nav>

  <h1 class="text-2xl font-bold text-gray-900 mb-6">Créer un groupe</h1>

  <form method="post" action="/groups/create" class="space-y-4">

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 space-y-4">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nom du groupe <span class="text-red-500">*</span></label>
        <input type="text" name="name" required maxlength="200"
               placeholder="Ex: Commission solidarité, Équipe web…"
               class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-loge-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Description (optionnel)</label>
        <textarea name="description" rows="2"
                  placeholder="Rôle et périmètre de ce groupe…"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-loge-500 resize-none"></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Type</label>
        <select name="group_type"
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-loge-500">
          <option value="COMMISSION">Commission (finance, solidarité, archives…)</option>
          <option value="CUSTOM">Groupe libre</option>
        </select>
        <p class="text-xs text-gray-400 mt-1">Les membres seront ajoutés manuellement après création.</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Couleur</label>
        <div class="flex items-center gap-3">
          <input type="color" name="color" value="#3b5bdb"
                 class="w-10 h-10 rounded-lg cursor-pointer border border-gray-200">
          <span class="text-xs text-gray-500">Utilisée pour les badges dans la messagerie et l'agenda</span>
        </div>
      </div>

    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="flex-1 bg-loge-700 text-white py-3 rounded-xl font-semibold hover:bg-loge-800 transition-colors">
        Créer le groupe
      </button>
      <a href="/groups/"
         class="px-5 py-3 border border-gray-200 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-50 transition-colors">
        Annuler
      </a>
    </div>

  </form>
</div>
{% endblock %}
