<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code 2FA — Portail Socrate</title>
  <link href="/static/css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
<div class="max-w-sm w-full space-y-5">
  <div class="text-center">
    <div class="text-5xl mb-3">🔐</div>
    <h1 class="text-xl font-bold text-gray-900">Vérification 2FA</h1>
    <p class="text-sm text-gray-500 mt-1">Entrez le code à 6 chiffres de votre application d'authentification.</p>
  </div>

  {% if error %}
  <div class="bg-rose-50 border border-rose-200 text-rose-800 rounded-2xl px-4 py-2 text-sm text-center">
    {{ error }}
  </div>
  {% endif %}

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
    <form method="post" action="/auth/2fa/verify" class="space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <input type="text" name="code" required placeholder="123456" autofocus
             class="w-full border border-gray-200 rounded-xl px-3 py-4 text-center font-mono text-3xl tracking-widest focus:ring-2 focus:ring-loge-500"
             maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      <button class="w-full bg-loge-700 hover:bg-loge-800 text-white text-sm font-semibold py-2.5 rounded-xl">
        Vérifier
      </button>
    </form>
  </div>
</div>
</body>
</html>
