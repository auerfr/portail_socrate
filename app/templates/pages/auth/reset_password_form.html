<!DOCTYPE html>
<html lang="fr" class="h-full bg-loge-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Portail Socrate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        loge: { 50:'#e6f4f1', 300:'#8eccc6', 500:'#4a9d8f', 600:'#3d8a7c', 700:'#2c7a7b', 800:'#236b6b', 900:'#1a5252' }
      }}}
    }
  </script>
</head>
<body class="h-full flex items-center justify-center bg-gradient-to-br from-loge-900 to-slate-900 px-4">

  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      {% if lodge and lodge.logo_url %}
      <div class="bg-white rounded-full p-2 inline-block mb-3 shadow-lg">
        <img src="/static/img/sceau-socrate-transparent.png" alt="Logo" class="h-20 w-auto object-contain" style="max-width:76px;">
      </div>
      {% else %}
      <div class="text-5xl mb-3">⚜</div>
      {% endif %}
      <h1 class="text-2xl font-bold text-white">{% if lodge and lodge.name %}{{ lodge.name }}{% else %}Portail Socrate{% endif %}</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <h2 class="text-lg font-semibold text-gray-800 mb-1">Nouveau mot de passe</h2>
      <p class="text-sm text-gray-500 mb-5">Choisissez un mot de passe d'au moins 8 caractères.</p>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/reset-password/{{ token }}" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="new_password">Nouveau mot de passe</label>
          <input type="password" id="new_password" name="new_password" required autofocus minlength="8"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-loge-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="confirm_password">Confirmer le mot de passe</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-loge-500 focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-loge-600 hover:bg-loge-700 text-white font-medium rounded-lg text-sm transition-colors">
          Enregistrer le nouveau mot de passe
        </button>
      </form>

    </div>
  </div>

</body>
</html>
