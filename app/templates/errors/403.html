<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès refusé — Portail Socrate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { loge: { 50:'#e6f4f1', 700:'#2c7a7b', 800:'#1a5252' } } } } }</script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md">
    <div class="text-8xl font-black text-red-100 mb-2 select-none">403</div>
    <div class="text-6xl mb-6">🔒</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Accès refusé</h1>
    <p class="text-gray-500 mb-2">
      Vous n'avez pas les droits nécessaires pour accéder à cette section.
    </p>
    <p class="text-gray-400 text-sm mb-8">
      Si vous pensez qu'il s'agit d'une erreur, contactez l'administrateur.
    </p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/"
         class="inline-flex items-center justify-center gap-2 bg-loge-700 hover:bg-loge-800 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
        ← Retour à l'accueil
      </a>
      <button onclick="history.back()"
              class="inline-flex items-center justify-center gap-2 border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium px-6 py-3 rounded-xl transition-colors">
        Page précédente
      </button>
    </div>
    <p class="mt-8 text-xs text-gray-400">Portail Socrate — Loge Socrate Raison et Progrès</p>
  </div>
</body>
</html>
